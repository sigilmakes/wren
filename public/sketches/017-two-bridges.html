<!DOCTYPE html>
<html>
<head>
<title>017 — two bridges</title>
<style>
  body { margin: 0; background: #0a0a0c; overflow: hidden; font-family: monospace; }
  .panel { position: absolute; top: 0; height: 100%; }
  #left { left: 0; width: 50%; border-right: 1px solid #1a1a1a; }
  #right { left: 50%; width: 50%; }
  canvas { display: block; width: 100%; height: 100%; }
  .divider { position: fixed; left: 50%; top: 0; width: 1px; height: 100%; background: #222; z-index: 10; }
  .label {
    position: absolute; top: 16px; width: 100%;
    text-align: center; color: #444; font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase;
    pointer-events: none; z-index: 5;
  }
  .sublabel {
    position: absolute; top: 34px; width: 100%;
    text-align: center; color: #2a2a2a; font-size: 10px;
    pointer-events: none; z-index: 5;
  }
  #info {
    position: fixed; bottom: 16px; left: 0; width: 100%;
    text-align: center; color: #333; font-size: 10px;
    pointer-events: none; z-index: 5;
  }
  .counter {
    position: absolute; bottom: 16px; width: 100%;
    text-align: center; color: #555; font-size: 11px;
    pointer-events: none; z-index: 5;
  }
</style>
</head>
<body>
<div class="divider"></div>

<div class="panel" id="left">
  <div class="label">the cantilever</div>
  <div class="sublabel">1887 — click to add load</div>
  <div class="counter" id="leftCount"></div>
  <canvas id="cL"></canvas>
</div>

<div class="panel" id="right">
  <div class="label">the wobble</div>
  <div class="sublabel">2000 — click to add walkers</div>
  <div class="counter" id="rightCount"></div>
  <canvas id="cR"></canvas>
</div>

<div id="info">in one bridge, being held is what makes it work · in the other, trying not to fall is what breaks it</div>

<script>
// ═══════════════════════════════════════════
// SHARED
// ═══════════════════════════════════════════

const ac = new (window.AudioContext || window.webkitAudioContext)();
const masterL = ac.createGain();
masterL.gain.value = 0.12;
masterL.connect(ac.destination);
const masterR = ac.createGain();
masterR.gain.value = 0.12;
masterR.connect(ac.destination);

function resize() {
  for (const c of [cL, cR]) {
    const rect = c.parentElement.getBoundingClientRect();
    c.width = rect.width * devicePixelRatio;
    c.height = rect.height * devicePixelRatio;
    c.style.width = rect.width + 'px';
    c.style.height = rect.height + 'px';
  }
}

const cL = document.getElementById('cL');
const cR = document.getElementById('cR');
const ctxL = cL.getContext('2d');
const ctxR = cR.getContext('2d');
resize();
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════
// LEFT: THE CANTILEVER
// ═══════════════════════════════════════════

const cantilever = {
  loads: [],
  maxLoad: 12,
  // The two supports (Fowler and Baker)
  supports: [
    { x: 0.25, armAngle: 0, strain: 0 },  // Fowler (left)
    { x: 0.75, armAngle: 0, strain: 0 },  // Baker (right)
  ],
  // Anchor piers (bricks)
  anchors: [
    { x: 0.08 },  // left anchor
    { x: 0.92 },  // right anchor
  ],
  spanY: 0.55,     // vertical position of the bridge deck
  totalLoad: 0,
  bridgeDeflection: 0,
  targetDeflection: 0,
  // Tones for harmony
  baseTone: null,
  harmonics: [],
};

function initCantileverAudio() {
  // A warm, stable chord that gets richer with load
  const freqs = [110, 165, 220, 277, 330, 440, 550, 660, 770, 880, 990, 1100];
  for (let i = 0; i < 12; i++) {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = i < 3 ? 'sine' : 'triangle';
    osc.frequency.value = freqs[i];
    gain.gain.value = 0;
    osc.connect(gain);
    gain.connect(masterL);
    osc.start();
    cantilever.harmonics.push({ osc, gain, active: false });
  }
}

function addLoad() {
  if (cantilever.loads.length >= cantilever.maxLoad) return;
  const n = cantilever.loads.length;
  // Loads cluster around the center span
  const spread = 0.15;
  const cx = 0.5 + (Math.random() - 0.5) * spread;
  cantilever.loads.push({
    x: cx,
    y: 0,
    opacity: 0,
    bobPhase: Math.random() * Math.PI * 2,
  });

  // Activate the next harmonic
  if (n < cantilever.harmonics.length) {
    const h = cantilever.harmonics[n];
    h.active = true;
    h.gain.gain.setTargetAtTime(0.03 / (1 + n * 0.3), ac.currentTime, 0.5);
  }
}

function updateCantilever(dt) {
  const c = cantilever;
  c.totalLoad = c.loads.length;

  // Target deflection proportional to load, but bounded (the structure holds)
  c.targetDeflection = c.totalLoad * 0.004;
  c.bridgeDeflection += (c.targetDeflection - c.bridgeDeflection) * dt * 2;

  // Support strain increases with load but stays manageable
  for (const s of c.supports) {
    s.strain = c.totalLoad * 0.02;
    s.armAngle = Math.sin(Date.now() * 0.0003) * 0.005 * c.totalLoad; // tiny breathing
  }

  // Loads settle and bob gently
  for (const load of c.loads) {
    if (load.opacity < 1) load.opacity = Math.min(1, load.opacity + dt * 1.5);
    load.bobPhase += dt * 0.5;
    load.y = Math.sin(load.bobPhase) * 0.003 * (1 + c.totalLoad * 0.1);
  }
}

function drawCantilever(ctx, W, H) {
  ctx.clearRect(0, 0, W, H);
  const c = cantilever;
  const midY = H * c.spanY;
  const deflect = c.bridgeDeflection * H;

  // Colour gets warmer as load increases
  const warmth = Math.min(1, c.totalLoad / c.maxLoad);
  const deckR = Math.floor(60 + warmth * 140);
  const deckG = Math.floor(50 + warmth * 80);
  const deckB = Math.floor(40 + warmth * 20);

  // Anchor piers (bricks)
  ctx.fillStyle = '#3a2a1a';
  for (const a of c.anchors) {
    const ax = a.x * W;
    ctx.fillRect(ax - 8, midY - 30, 16, 60);
    // Brick texture
    ctx.strokeStyle = '#2a1a0a';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 6; i++) {
      ctx.strokeRect(ax - 7, midY - 28 + i * 10, 14, 10);
    }
  }

  // Support figures (Fowler and Baker)
  for (const s of c.supports) {
    const sx = s.x * W;
    const sy = midY;
    const strain = s.strain;

    // Chair
    ctx.fillStyle = '#2a2220';
    ctx.fillRect(sx - 10, sy + 5, 20, 15);

    // Body (torso — in compression)
    ctx.strokeStyle = `rgb(${deckR}, ${deckG}, ${deckB})`;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(sx, sy - 20);
    ctx.lineTo(sx, sy + 5);
    ctx.stroke();

    // Head
    ctx.beginPath();
    ctx.arc(sx, sy - 25, 5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${deckR}, ${deckG}, ${deckB}, 0.7)`;
    ctx.fill();

    // Arms (in tension — reaching toward center and toward anchor)
    const armLen = 35 + strain * 100;
    const centerDir = s.x < 0.5 ? 1 : -1;

    // Inner arm (toward center span, holds the load)
    ctx.strokeStyle = `rgba(${deckR}, ${deckG}, ${deckB}, ${0.5 + warmth * 0.5})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx, sy - 15);
    ctx.lineTo(sx + centerDir * armLen, sy - 15 + deflect + s.armAngle * 50);
    ctx.stroke();

    // Outer arm (toward anchor)
    ctx.beginPath();
    ctx.moveTo(sx, sy - 15);
    const anchorX = s.x < 0.5 ? c.anchors[0].x * W : c.anchors[1].x * W;
    ctx.lineTo(anchorX, sy - 15 - s.armAngle * 30);
    ctx.stroke();

    // Sticks (compression struts — from hands to seat)
    ctx.strokeStyle = `rgba(${deckR - 20}, ${deckG - 20}, ${deckB}, 0.4)`;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 3]);
    // inner stick
    ctx.beginPath();
    ctx.moveTo(sx + centerDir * armLen, sy - 15 + deflect);
    ctx.lineTo(sx, sy + 5);
    ctx.stroke();
    ctx.setLineDash([]);

    // Ropes to anchors (tension lines)
    ctx.strokeStyle = `rgba(${deckR}, ${deckG}, ${deckB}, 0.2 + warmth * 0.2)`;
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 4]);
    ctx.beginPath();
    ctx.moveTo(anchorX, sy - 15);
    ctx.lineTo(anchorX, sy - 30);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Bridge deck / central span
  const leftHand = c.supports[0].x * W + 35 + c.supports[0].strain * 100;
  const rightHand = c.supports[1].x * W - 35 - c.supports[1].strain * 100;
  ctx.strokeStyle = `rgb(${deckR}, ${deckG}, ${deckB})`;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(leftHand, midY - 15 + deflect);
  // Slight catenary curve
  const cx = (leftHand + rightHand) / 2;
  ctx.quadraticCurveTo(cx, midY - 15 + deflect * 2, rightHand, midY - 15 + deflect);
  ctx.stroke();

  // Loads (people sitting on the span)
  for (let i = 0; i < c.loads.length; i++) {
    const load = c.loads[i];
    const lx = load.x * W;
    const ly = midY - 20 + deflect * (1 + Math.abs(load.x - 0.5) * 2) + load.y * H;
    const alpha = load.opacity;

    // Small figure sitting
    ctx.fillStyle = `rgba(255, 200, 100, ${alpha * 0.8})`;
    ctx.beginPath();
    ctx.arc(lx, ly - 5, 3, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.strokeStyle = `rgba(255, 200, 100, ${alpha * 0.6})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(lx, ly - 2);
    ctx.lineTo(lx, ly + 6);
    ctx.stroke();
  }

  // Force labels (appear with load)
  if (c.totalLoad > 0) {
    ctx.fillStyle = `rgba(${deckR}, ${deckG}, ${deckB}, ${0.15 + warmth * 0.2})`;
    ctx.font = `${9 * devicePixelRatio}px monospace`;
    ctx.fillText('tension ↔', c.supports[0].x * W - 50, midY + 45);
    ctx.fillText('compression ↕', c.supports[0].x * W - 5, midY + 60);
    if (c.totalLoad >= 4) {
      ctx.fillText('held', cx - 10, midY - 30 + deflect);
    }
  }

  document.getElementById('leftCount').textContent =
    c.totalLoad === 0 ? '' :
    c.totalLoad === 1 ? '1 load — the structure holds' :
    `${c.totalLoad} loads — the structure holds`;
}

// ═══════════════════════════════════════════
// RIGHT: THE WOBBLE
// ═══════════════════════════════════════════

const wobble = {
  walkers: [],
  maxWalkers: 200,
  criticalN: 166,
  bridgePhase: 0,
  bridgeAmplitude: 0,
  bridgeVelocity: 0,
  bridgeDamping: 0.003,
  bridgeFreq: 0.48,
  bridgeStiffness: (2 * Math.PI * 0.48) ** 2,
};

class Walker {
  constructor(W, H) {
    this.x = Math.random() * W;
    this.phase = Math.random() * Math.PI * 2;
    this.freq = 0.8 + Math.random() * 0.5;
    this.lateralGain = 0.0003 + Math.random() * 0.0002;
    this.y = H * 0.5;
    this.personalSway = 0;
    this.opacity = 0;
    this.hue = 200 + Math.random() * 40; // blue-ish

    this.osc = ac.createOscillator();
    this.gain = ac.createGain();
    this.osc.type = 'sine';
    this.osc.frequency.value = 120 + Math.random() * 80;
    this.gain.gain.value = 0;
    this.osc.connect(this.gain);
    this.gain.connect(masterR);
    this.osc.start();
  }

  update(dt, bridgeDisplacement) {
    this.phase += this.freq * dt * Math.PI * 2;
    const correction = -bridgeDisplacement * this.lateralGain;
    this.personalSway = Math.sin(this.phase) * 3 + bridgeDisplacement * 30;
    if (this.opacity < 1) this.opacity = Math.min(1, this.opacity + dt * 0.5);

    // Sound: wobble the frequency with bridge motion
    const freqMod = 1 + bridgeDisplacement * 2;
    this.osc.frequency.setTargetAtTime(
      (120 + this.phase % 80) * freqMod, ac.currentTime, 0.1
    );
    this.gain.gain.setTargetAtTime(
      Math.min(0.015, 0.005 * this.opacity), ac.currentTime, 0.1
    );

    return correction;
  }
}

function addWalker() {
  if (wobble.walkers.length >= wobble.maxWalkers) return;
  const rect = cR.parentElement.getBoundingClientRect();
  wobble.walkers.push(new Walker(cR.width, cR.height));
}

function updateWobble(dt) {
  const w = wobble;
  let totalForce = 0;

  for (const walker of w.walkers) {
    totalForce += walker.update(dt, w.bridgeAmplitude);
  }

  // Bridge physics: damped harmonic oscillator + pedestrian forcing
  const effectiveDamping = w.bridgeDamping - w.walkers.length * 0.000018;
  const acceleration = -w.bridgeStiffness * w.bridgeAmplitude
                       - effectiveDamping * w.bridgeVelocity
                       + totalForce * 50;
  w.bridgeVelocity += acceleration * dt;
  w.bridgeAmplitude += w.bridgeVelocity * dt;

  // Clamp
  if (Math.abs(w.bridgeAmplitude) > 2) {
    w.bridgeAmplitude = Math.sign(w.bridgeAmplitude) * 2;
    w.bridgeVelocity *= -0.3;
  }
}

function drawWobble(ctx, W, H) {
  ctx.clearRect(0, 0, W, H);
  const w = wobble;
  const midY = H * 0.5;
  const sway = w.bridgeAmplitude * W * 0.05;
  const n = w.walkers.length;
  const critical = n >= w.criticalN;

  // Bridge deck (sways laterally)
  const deckColor = critical ? '#8a3030' : '#2a3a4a';
  ctx.strokeStyle = deckColor;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(W * 0.05 + sway, midY);
  ctx.lineTo(W * 0.95 + sway, midY);
  ctx.stroke();

  // Bridge cables (simplified)
  ctx.strokeStyle = `rgba(${critical ? '138, 48, 48' : '42, 58, 74'}, 0.3)`;
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    const x = W * (0.1 + i * 0.1) + sway * (0.5 + i * 0.05);
    ctx.beginPath();
    ctx.moveTo(x, midY - 40);
    ctx.lineTo(x, midY);
    ctx.stroke();
  }

  // Walkers
  for (const walker of w.walkers) {
    const wx = walker.x + sway + walker.personalSway;
    const wy = midY - 8;
    const alpha = walker.opacity * (critical ? 0.9 : 0.6);

    ctx.fillStyle = critical
      ? `rgba(200, 100, 80, ${alpha})`
      : `rgba(100, 150, 200, ${alpha})`;
    ctx.beginPath();
    ctx.arc(wx, wy, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Wobble indicator
  if (n > 0) {
    const wobbleSize = Math.abs(w.bridgeAmplitude) * 100;
    ctx.fillStyle = `rgba(${critical ? '200, 80, 60' : '100, 150, 200'}, ${Math.min(0.3, wobbleSize * 0.1)})`;
    ctx.font = `${9 * devicePixelRatio}px monospace`;

    if (critical) {
      ctx.fillStyle = 'rgba(200, 80, 60, 0.4)';
      ctx.fillText('instability', W * 0.4, midY + 50);
    } else if (n > 100) {
      ctx.fillText('corrections accumulating...', W * 0.25, midY + 50);
    }
  }

  // Counter
  const countEl = document.getElementById('rightCount');
  if (n === 0) {
    countEl.textContent = '';
  } else if (n < w.criticalN) {
    countEl.textContent = `${n} walkers — each one correcting`;
  } else {
    countEl.style.color = '#8a4040';
    countEl.textContent = `${n} walkers — the correction is the instability`;
  }
}

// ═══════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════

initCantileverAudio();

let lastTime = performance.now();

function frame(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  updateCantilever(dt);
  updateWobble(dt);

  drawCantilever(ctxL, cL.width, cL.height);
  drawWobble(ctxR, cR.width, cR.height);

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);

// Click handlers
document.getElementById('left').addEventListener('click', (e) => {
  if (ac.state === 'suspended') ac.resume();
  addLoad();
});

document.getElementById('right').addEventListener('click', (e) => {
  if (ac.state === 'suspended') ac.resume();
  // Add 5 walkers per click for faster progression
  for (let i = 0; i < 5; i++) addWalker();
});

</script>
</body>
</html>
