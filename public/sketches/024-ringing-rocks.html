<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>024 — ringing rocks</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #d0d0c8;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    user-select: none;
    overflow: hidden;
  }
  #title {
    font-size: 14px;
    letter-spacing: 2px;
    opacity: 0.5;
    margin-bottom: 30px;
    z-index: 10;
  }
  #field {
    position: relative;
    width: 800px;
    height: 500px;
    border: 1px solid #1a1a1a;
    cursor: crosshair;
    overflow: hidden;
  }
  .stone {
    position: absolute;
    cursor: pointer;
    transition: none;
  }
  .stone:hover {
    filter: brightness(1.15);
  }
  .stone.struck-ring {
    animation: ringGlow 3s ease-out forwards;
  }
  .stone.struck-dead {
    animation: deadShake 0.15s ease-out;
  }
  @keyframes ringGlow {
    0% { filter: brightness(2.5) drop-shadow(0 0 12px rgba(200, 170, 120, 0.9)); }
    15% { filter: brightness(1.8) drop-shadow(0 0 8px rgba(200, 170, 120, 0.6)); }
    100% { filter: brightness(1.0) drop-shadow(0 0 0px rgba(200, 170, 120, 0)); }
  }
  @keyframes deadShake {
    0% { transform: translate(0, 0); }
    25% { transform: translate(-2px, 1px); }
    50% { transform: translate(2px, -1px); }
    75% { transform: translate(-1px, 0); }
    100% { transform: translate(0, 0); }
  }
  #counter {
    position: fixed;
    top: 20px;
    right: 30px;
    font-size: 12px;
    opacity: 0.3;
    text-align: right;
    line-height: 1.6;
  }
  #instructions {
    position: fixed;
    bottom: 20px;
    font-size: 11px;
    opacity: 0.25;
    text-align: center;
    line-height: 1.6;
  }
  #epigraph {
    position: fixed;
    bottom: 50px;
    font-size: 11px;
    opacity: 0;
    font-style: italic;
    text-align: center;
    transition: opacity 2s ease-in;
    color: #a09080;
  }
</style>
</head>
<body>
<div id="title">024 — ringing rocks</div>
<div id="field"></div>
<div id="counter"></div>
<div id="instructions">click a stone. some ring. some don't.<br>you can't tell from looking.</div>
<div id="epigraph"></div>

<script>
const field = document.getElementById('field');
const counterEl = document.getElementById('counter');
const epigraphEl = document.getElementById('epigraph');

let audioCtx = null;
let stones = [];
let struckCount = 0;
let ringersFound = 0;
let totalRingers = 0;

// Seed a deterministic random for reproducible fields
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

const rng = mulberry32(7777); // fixed seed — same field every time

// Lithophone tuning: pentatonic-ish intervals in the range of real stone strikes
// Based on đàn đá tunings and Stonehenge bluestone resonances
const RING_FREQS = [
  196.0,  // G3
  220.0,  // A3
  261.6,  // C4
  293.7,  // D4
  329.6,  // E4
  392.0,  // G4
  440.0,  // A4
  523.3,  // C5
  587.3,  // D5
  659.3,  // E5
];

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function generateStoneShape(size) {
  // Generate an irregular polygon for each stone
  const points = [];
  const numPoints = 5 + Math.floor(rng() * 4); // 5-8 vertices
  for (let i = 0; i < numPoints; i++) {
    const angle = (i / numPoints) * Math.PI * 2 + (rng() - 0.5) * 0.4;
    const r = size * (0.6 + rng() * 0.4);
    points.push({
      x: size + Math.cos(angle) * r,
      y: size + Math.sin(angle) * r
    });
  }
  return points;
}

function drawStoneSVG(points, size, id) {
  const svgSize = size * 2 + 4;
  // Stone color: grey-brown, all identical-looking
  const base = 60 + Math.floor(rng() * 25);
  const r = base + Math.floor(rng() * 10);
  const g = base + Math.floor(rng() * 5);
  const b = base - Math.floor(rng() * 10);
  const fill = `rgb(${r},${g},${b})`;

  // Slightly lighter highlight
  const hr = Math.min(255, r + 20);
  const hg = Math.min(255, g + 15);
  const hb = Math.min(255, b + 10);
  const highlight = `rgb(${hr},${hg},${hb})`;

  let pathD = `M ${points[0].x} ${points[0].y}`;
  for (let i = 1; i < points.length; i++) {
    pathD += ` L ${points[i].x} ${points[i].y}`;
  }
  pathD += ' Z';

  // Offset highlight path
  let highlightD = `M ${points[0].x - 1} ${points[0].y - 2}`;
  for (let i = 1; i < Math.ceil(points.length / 2); i++) {
    highlightD += ` L ${points[i].x - 1} ${points[i].y - 2}`;
  }

  return `<svg width="${svgSize}" height="${svgSize}" viewBox="0 0 ${svgSize} ${svgSize}" xmlns="http://www.w3.org/2000/svg">
    <path d="${pathD}" fill="${fill}" stroke="rgba(40,35,30,0.6)" stroke-width="1"/>
    <path d="${highlightD}" fill="none" stroke="${highlight}" stroke-width="1" opacity="0.4"/>
  </svg>`;
}

function playRing(freq) {
  if (!audioCtx) initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const now = audioCtx.currentTime;
  const duration = 3.5 + Math.random() * 1.5;

  // Main tone — clear, bell-like
  const osc1 = audioCtx.createOscillator();
  osc1.type = 'sine';
  osc1.frequency.value = freq;

  // Second partial — slight detuning for life
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = freq * 2.003; // slightly inharmonic, like real stone

  // Third partial — very quiet upper shimmer
  const osc3 = audioCtx.createOscillator();
  osc3.type = 'sine';
  osc3.frequency.value = freq * 3.98;

  // Strike transient — noise burst
  const noiseLen = 0.04;
  const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * noiseLen, audioCtx.sampleRate);
  const noiseData = noiseBuffer.getChannelData(0);
  for (let i = 0; i < noiseData.length; i++) {
    noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.008));
  }
  const noiseSource = audioCtx.createBufferSource();
  noiseSource.buffer = noiseBuffer;

  // Bandpass the noise around the fundamental
  const noiseBP = audioCtx.createBiquadFilter();
  noiseBP.type = 'bandpass';
  noiseBP.frequency.value = freq * 1.5;
  noiseBP.Q.value = 2;

  const noiseGain = audioCtx.createGain();
  noiseGain.gain.value = 0.4;

  noiseSource.connect(noiseBP);
  noiseBP.connect(noiseGain);
  noiseGain.connect(audioCtx.destination);

  // Envelopes
  const gain1 = audioCtx.createGain();
  gain1.gain.setValueAtTime(0.25, now);
  gain1.gain.exponentialRampToValueAtTime(0.001, now + duration);

  const gain2 = audioCtx.createGain();
  gain2.gain.setValueAtTime(0.1, now);
  gain2.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.7);

  const gain3 = audioCtx.createGain();
  gain3.gain.setValueAtTime(0.04, now);
  gain3.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.4);

  osc1.connect(gain1);
  gain1.connect(audioCtx.destination);
  osc2.connect(gain2);
  gain2.connect(audioCtx.destination);
  osc3.connect(gain3);
  gain3.connect(audioCtx.destination);

  osc1.start(now);
  osc2.start(now);
  osc3.start(now);
  noiseSource.start(now);

  osc1.stop(now + duration);
  osc2.stop(now + duration);
  osc3.stop(now + duration);
  noiseSource.stop(now + noiseLen);
}

function playDead() {
  if (!audioCtx) initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const now = audioCtx.currentTime;

  // Just a dull thud — noise burst, no tone, very short
  const duration = 0.12;
  const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.015));
  }

  const source = audioCtx.createBufferSource();
  source.buffer = buffer;

  // Low-pass: muffled
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 300 + Math.random() * 200;
  lp.Q.value = 0.5;

  const gain = audioCtx.createGain();
  gain.gain.value = 0.25;

  source.connect(lp);
  lp.connect(gain);
  gain.connect(audioCtx.destination);

  source.start(now);
  source.stop(now + duration);
}

function updateCounter() {
  if (struckCount === 0) {
    counterEl.textContent = '';
    return;
  }
  counterEl.innerHTML = `struck: ${struckCount}<br>rang: ${ringersFound}<br>silent: ${struckCount - ringersFound}`;

  // Show epigraph after finding enough ringers or striking enough stones
  if (struckCount >= 12 && ringersFound >= 2) {
    epigraphEl.textContent = 'you can\'t tell from outside which stone has a voice.';
    epigraphEl.style.opacity = '0.35';
  }
  if (ringersFound >= 5) {
    epigraphEl.textContent = 'the voice is internal. — ringing rocks park, pennsylvania';
    epigraphEl.style.opacity = '0.35';
  }
  if (struckCount >= stones.length) {
    epigraphEl.textContent = `${ringersFound} of ${stones.length} had a voice. the rest were identical.`;
    epigraphEl.style.opacity = '0.4';
  }
}

function placeStones() {
  const numStones = 35;
  const placed = [];

  for (let i = 0; i < numStones; i++) {
    const size = 18 + Math.floor(rng() * 18); // 18-36px radius
    const rings = rng() < 0.33; // ~1/3 ring
    if (rings) totalRingers++;

    // Assign a frequency from the lithophone scale
    const freq = RING_FREQS[Math.floor(rng() * RING_FREQS.length)];

    // Try to place without overlap
    let x, y, attempts = 0;
    do {
      x = 20 + rng() * (760 - size * 2);
      y = 10 + rng() * (470 - size * 2);
      attempts++;
    } while (attempts < 50 && placed.some(p =>
      Math.hypot(p.x - x, p.y - y) < (p.size + size) * 1.1
    ));

    placed.push({ x, y, size });

    const points = generateStoneShape(size);
    const svg = drawStoneSVG(points, size, i);

    const el = document.createElement('div');
    el.className = 'stone';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.innerHTML = svg;

    let struck = false;

    el.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!audioCtx) initAudio();

      if (struck) {
        // Can re-strike ringers to hear them again
        if (rings) {
          playRing(freq);
          el.classList.remove('struck-ring');
          void el.offsetWidth; // force reflow
          el.classList.add('struck-ring');
        } else {
          playDead();
          el.classList.remove('struck-dead');
          void el.offsetWidth;
          el.classList.add('struck-dead');
        }
        return;
      }

      struck = true;
      struckCount++;

      if (rings) {
        ringersFound++;
        playRing(freq);
        el.classList.add('struck-ring');
      } else {
        playDead();
        el.classList.add('struck-dead');
      }

      updateCounter();
    });

    stones.push({ el, rings, freq, struck: false });
    field.appendChild(el);
  }
}

placeStones();
</script>
</body>
</html>
